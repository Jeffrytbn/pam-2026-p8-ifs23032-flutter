name: pam_p8_ifs23032
description: Delcom Todos Flutter App - PAM Praktikum 8 | Jeffry Tambunan | IFS23032
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  # HTTP Client
  http: ^1.2.1

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.2.0

  # Image Picker (cross-platform)
  image_picker: ^1.1.2

  # Local Storage
  shared_preferences: ^2.3.2

  # Image rendering
  cached_network_image: ^3.4.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/